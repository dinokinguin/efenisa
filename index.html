<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ses Kutusu</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ses Kutusu">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            background-color: #0d0e12;
        }
        html, body { position: fixed; overflow: hidden; width: 100%; height: 100%; }
        .scrollable { overflow-y: auto; height: calc(100% - 140px); -webkit-overflow-scrolling: touch; }
        @keyframes pulse-wave { 0%, 100% { transform: scaleY(0.3); } 50% { transform: scaleY(1); } }
        .wave-bar { animation: pulse-wave 1.2s ease-in-out infinite; }
        .wave-bar:nth-child(2) { animation-delay: 0.15s; }
        .wave-bar:nth-child(3) { animation-delay: 0.30s; }
        .wave-bar:nth-child(4) { animation-delay: 0.45s; }
        .wave-bar:nth-child(5) { animation-delay: 0.60s; }
    </style>
</head>
<body class="text-white flex flex-col justify-between h-full">

    <!-- HEADER -->
    <div class="px-6 pt-12 pb-4 border-b border-gray-800 bg-[#16181f]/80 backdrop-blur-md shrink-0">
        <div class="flex justify-between items-center">
            <div>
                <p class="text-xs text-gray-400 uppercase tracking-widest font-semibold">Sevgilime Ozel</p>
                <h1 class="text-3xl font-bold tracking-tight bg-gradient-to-r from-pink-500 to-rose-400 bg-clip-text text-transparent">Ses Kutusu ❤️</h1>
            </div>
            <div id="audio-wave" class="hidden items-end space-x-1 h-8">
                <div class="w-1 h-6 bg-rose-500 rounded-full wave-bar"></div>
                <div class="w-1 h-8 bg-rose-400 rounded-full wave-bar"></div>
                <div class="w-1.5 h-10 bg-pink-500 rounded-full wave-bar"></div>
                <div class="w-1 h-8 bg-rose-400 rounded-full wave-bar"></div>
                <div class="w-1 h-6 bg-rose-500 rounded-full wave-bar"></div>
            </div>
        </div>
    </div>

    <!-- SES KARTLARI -->
    <div class="scrollable px-4 py-6 grid grid-cols-2 gap-4" id="buttons-container"></div>

    <!-- ALT BAR -->
    <div class="px-6 py-4 bg-[#16181f] border-t border-gray-800 flex justify-between items-center z-10 shrink-0">
        <div class="text-xs text-gray-500">Yapimci: <span class="font-semibold text-gray-400">Efe</span></div>
        <button onclick="toggleAdminPanel()" class="w-10 h-10 bg-gray-800 hover:bg-gray-700 active:scale-90 transition rounded-full flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12.01 12a4.237 4.237 0 000-8.474 4.237 4.237 0 000 8.474zM2.105 20.316A9.895 9.895 0 0112 10.421a9.895 9.895 0 019.895 9.895" />
            </svg>
        </button>
    </div>

    <!-- ADMIN MODAL -->
    <div id="admin-modal" class="fixed inset-0 bg-black/80 backdrop-blur-md flex items-end justify-center transition-all duration-300 translate-y-full z-50">
        <div class="bg-[#1c1e27] w-full rounded-t-3xl p-6 max-h-[85vh] overflow-y-auto pb-12">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-pink-500">Sesleri Duzenle</h2>
                <button onclick="toggleAdminPanel()" class="text-gray-400 hover:text-white font-medium">Kapat</button>
            </div>
            <div class="bg-[#252836] p-4 rounded-2xl mb-6 space-y-3">
                <h3 class="text-sm font-semibold text-gray-300">Yeni Ses Karti Ekle</h3>
                <div class="grid grid-cols-4 gap-2">
                    <input id="new-emoji" type="text" placeholder="Emoji" class="col-span-1 bg-[#16181f] border border-gray-700 rounded-xl p-3 text-center text-xl focus:outline-none focus:border-pink-500">
                    <input id="new-title" type="text" placeholder="Buton Basligi" class="col-span-3 bg-[#16181f] border border-gray-700 rounded-xl p-3 text-sm focus:outline-none focus:border-pink-500">
                </div>
                <input id="new-text" type="text" placeholder="Soylenecek Soz" class="w-full bg-[#16181f] border border-gray-700 rounded-xl p-3 text-sm focus:outline-none focus:border-pink-500">
                <select id="new-color" class="w-full bg-[#16181f] border border-gray-700 rounded-xl p-3 text-sm focus:outline-none focus:border-pink-500">
                    <option value="from-pink-500 to-rose-500">Ask Pembesi</option>
                    <option value="from-violet-600 to-indigo-600">Gece Mavisi</option>
                    <option value="from-amber-500 to-orange-500">Enerjik Turuncu</option>
                    <option value="from-emerald-500 to-teal-500">Huzur Yesili</option>
                    <option value="from-red-600 to-rose-700">Canli Kirmizi</option>
                </select>
                <button onclick="addNewSound()" class="w-full bg-pink-500 hover:bg-pink-600 active:scale-95 transition py-3 rounded-xl font-semibold text-sm">Listeye Ekle</button>
            </div>
            <h3 class="text-sm font-semibold mb-3 text-gray-300">Mevcut Butonlari Sil</h3>
            <div id="admin-list" class="space-y-2"></div>
        </div>
    </div>

    <script>
        var defaultSounds = [
    {
        "id": "1",
        "emoji": "❤️",
        "title": "Efeyi Seviyorum",
        "text": "Efeyi dünyalar kadar çok seviyorum!",
        "color": "from-pink-500 to-rose-500"
    },
    {
        "id": "2",
        "emoji": "🥱",
        "title": "Çok Yorgunum",
        "text": "Aşkım bugün gerçekten çok yorgunum.",
        "color": "from-violet-600 to-indigo-600"
    },
    {
        "id": "3",
        "emoji": "😊",
        "title": "Mutluyum",
        "text": "Şu an içim kıpır kıpır, çok mutluyum!",
        "color": "from-amber-500 to-orange-500"
    },
    {
        "id": "4",
        "emoji": "🥺",
        "title": "Seni Özledim",
        "text": "Çok özledim seni, hemen gelsen keşke.",
        "color": "from-red-600 to-rose-700"
    }
];
        var sounds = [];

        window.onload = function() {
            try {
                var saved = localStorage.getItem("ses_kutusu_sounds");
                sounds = saved ? JSON.parse(saved) : defaultSounds.slice();
            } catch(e) {
                sounds = defaultSounds.slice();
            }
            renderButtons();
            if (window.speechSynthesis) {
                window.speechSynthesis.getVoices();
                window.speechSynthesis.onvoiceschanged = function() { window.speechSynthesis.getVoices(); };
            }
        };

        function save() { localStorage.setItem("ses_kutusu_sounds", JSON.stringify(sounds)); }

        function escHtml(s) {
            return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
        }

        function renderButtons() {
            var container = document.getElementById("buttons-container");
            var adminList = document.getElementById("admin-list");
            container.innerHTML = "";
            adminList.innerHTML = "";
            sounds.forEach(function(sound) {
                var btn = document.createElement("button");
                btn.className = "bg-gradient-to-br " + sound.color + " p-5 rounded-2xl flex flex-col items-center justify-center text-center shadow-lg active:scale-95 transition duration-150 h-36 border border-white/10";
                btn.onclick = function() { playTTS(sound.text); };
                btn.innerHTML = "<span class=\"text-4xl mb-3 block\">" + sound.emoji + "</span><span class=\"text-sm font-semibold tracking-wide block leading-snug\">" + escHtml(sound.title) + "</span>";
                container.appendChild(btn);
                var item = document.createElement("div");
                item.className = "flex justify-between items-center bg-[#16181f] p-3 rounded-xl border border-gray-800";
                item.innerHTML = "<div class=\"flex items-center space-x-3 text-left\"><span class=\"text-xl\">" + sound.emoji + "</span><div><p class=\"text-sm font-semibold text-white\">" + escHtml(sound.title) + "</p><p class=\"text-xs text-gray-500 truncate max-w-[180px]\">" + escHtml(sound.text) + "</p></div></div><button class=\"delete-btn bg-red-500/10 hover:bg-red-500/20 text-red-400 px-3 py-1.5 rounded-lg text-xs font-semibold\" data-id=\"" + sound.id + "\">Sil</button>";
                adminList.appendChild(item);
            });
            adminList.querySelectorAll(".delete-btn").forEach(function(b) {
                b.addEventListener("click", function() { deleteSound(b.dataset.id); });
            });
        }

        function playTTS(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            var utt = new SpeechSynthesisUtterance(text);
            utt.lang = "tr-TR"; utt.rate = 1.0; utt.pitch = 1.15;
            var trVoice = window.speechSynthesis.getVoices().find(function(v) { return v.lang && v.lang.startsWith("tr"); });
            if (trVoice) utt.voice = trVoice;
            var wave = document.getElementById("audio-wave");
            utt.onstart = function() { wave.classList.remove("hidden"); wave.classList.add("flex"); };
            utt.onend   = function() { wave.classList.add("hidden"); wave.classList.remove("flex"); };
            utt.onerror = function() { wave.classList.add("hidden"); wave.classList.remove("flex"); };
            window.speechSynthesis.speak(utt);
        }

        function addNewSound() {
            var emoji = document.getElementById("new-emoji").value.trim() || "📣";
            var title = document.getElementById("new-title").value.trim();
            var text  = document.getElementById("new-text").value.trim();
            var color = document.getElementById("new-color").value;
            if (!title || !text) { alert("Lutfen tum alanlari doldurun!"); return; }
            sounds.push({ id: Date.now().toString(), emoji: emoji, title: title, text: text, color: color });
            save(); renderButtons();
            document.getElementById("new-emoji").value = "";
            document.getElementById("new-title").value = "";
            document.getElementById("new-text").value  = "";
        }

        function deleteSound(id) {
            sounds = sounds.filter(function(s) { return s.id !== id; });
            save(); renderButtons();
        }

        var isAdminOpen = false;
        function toggleAdminPanel() {
            var modal = document.getElementById("admin-modal");
            isAdminOpen = !isAdminOpen;
            modal.classList.toggle("translate-y-full", !isAdminOpen);
        }
    </script>
</body>
</html>
